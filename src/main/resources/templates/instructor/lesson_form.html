<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Lesson | Radical_ Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d0d0d;
            --paper: #f7f5f0;
            --accent: #e8401c;
            --accent-2: #1c6ee8;
            --muted: #7a7672;
            --card-bg: #ffffff;
            --border: rgba(13,13,13,0.1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* NAV */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(247,245,240,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 68px;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1.25rem; letter-spacing: -0.03em;
            color: var(--ink); text-decoration: none;
            display: flex; align-items: center; gap: 0.35rem;
        }
        .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; margin-bottom: 2px; }
        .btn-ghost {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8125rem;
            padding: 0.5rem 1rem; color: var(--muted); background: transparent;
            border-radius: 6px; text-decoration: none; transition: all 0.2s; border: none;
        }
        .btn-ghost:hover { background: rgba(13,13,13,0.06); color: var(--ink); }

        /* PAGE */
        .page-wrap { max-width: 680px; margin: 0 auto; padding: 3rem 2rem 6rem; }

        .back-link {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.8125rem; font-weight: 500; color: var(--muted);
            text-decoration: none; margin-bottom: 2.5rem; transition: color 0.2s;
        }
        .back-link:hover { color: var(--ink); }

        .section-eyebrow {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem;
        }
        .section-eyebrow::before { content: ''; width: 20px; height: 1.5px; background: var(--muted); display: block; }

        .module-name {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 800; letter-spacing: -0.03em; color: var(--ink);
            margin-bottom: 0.35rem;
        }
        .page-subtitle {
            font-size: 0.875rem; color: var(--muted); font-weight: 300; margin-bottom: 2.5rem;
        }

        /* FORM CARD */
        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-label {
            display: block; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--muted); margin-bottom: 0.5rem;
        }
        .form-label i { margin-right: 0.35rem; }

        .form-input, .form-textarea {
            width: 100%; background: var(--paper);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 0.875rem 1rem; font-family: 'DM Sans', sans-serif;
            font-size: 0.9375rem; font-weight: 400; color: var(--ink);
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: var(--ink); box-shadow: 0 0 0 3px rgba(13,13,13,0.06);
        }
        .form-textarea { resize: vertical; min-height: 160px; line-height: 1.7; }
        .form-textarea:focus {
            border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(28,110,232,0.08);
        }

        /* DIVIDER */
        .or-divider {
            display: flex; align-items: center; gap: 1rem;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--muted);
            margin: 0.5rem 0;
        }
        .or-divider::before, .or-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* PDF UPLOAD ZONE */
        .upload-zone {
            border: 1.5px dashed rgba(13,13,13,0.2);
            border-radius: 10px;
            padding: 1.75rem;
            background: rgba(13,13,13,0.02);
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-zone:hover { border-color: var(--accent); background: #fff0ed; }

        .upload-icon {
            width: 44px; height: 44px; border-radius: 10px;
            background: #fff0ed; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: var(--accent); margin-bottom: 0.875rem;
        }

        .upload-label {
            font-size: 0.8125rem; font-weight: 600; color: var(--ink); margin-bottom: 0.25rem;
        }
        .upload-hint {
            font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem; font-weight: 300;
        }

        input[type=file] { font-size: 0.875rem; color: var(--muted); cursor: pointer; }
        input[type=file]::file-selector-button {
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.04em;
            padding: 0.5rem 1rem; border-radius: 6px;
            background: var(--ink); color: #fff;
            border: none; cursor: pointer; margin-right: 0.75rem;
            transition: background 0.2s;
        }
        input[type=file]::file-selector-button:hover { background: #2a2a2a; }

        /* FORM ACTIONS */
        .form-actions {
            margin-top: 2rem;
            padding-top: 1.75rem; border-top: 1px solid var(--border);
        }

        .btn-save {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9375rem;
            letter-spacing: 0.02em; padding: 1rem 2rem;
            background: var(--ink); color: #fff;
            border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s;
        }
        .btn-save:hover { background: #2a2a2a; transform: translateY(-1px); }

        /* FOOTER */
        footer { border-top: 1px solid var(--border); padding: 2rem; }
        .footer-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            gap: 1rem; flex-wrap: wrap;
        }
        .footer-logo {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
            letter-spacing: -0.02em; color: var(--ink); text-decoration: none;
        }
        .footer-copy { font-size: 0.75rem; color: var(--muted); }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a th:href="@{/}" class="logo"><span class="logo-dot"></span>Radical</a>
        <a th:href="@{/instructor/courses/{id}/modules(id=${courseId})}" class="btn-ghost">&larr; Modules</a>
    </div>
</nav>

<div class="page-wrap">

    <a th:href="@{/instructor/courses/{id}/modules(id=${courseId})}" class="back-link">
        <i class="fas fa-arrow-left" style="font-size:0.75rem;"></i> Back to Modules
    </a>

    <p class="section-eyebrow">Add Lesson</p>
    <h1 class="module-name" th:text="${module.title}">Module Title</h1>
    <p class="page-subtitle">Add a text article, a PDF document, or both.</p>

    <div class="form-card">
        <form th:action="@{/instructor/courses/{courseId}/modules/{moduleId}/lessons/create(courseId=${courseId}, moduleId=${module.id})}"
              th:object="${lesson}" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label class="form-label">Lesson Title</label>
                <input type="text" th:field="*{title}" required class="form-input" placeholder="e.g. 1. Introduction to Java">
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-align-left" style="color:var(--accent-2);"></i> Article Text
                    <span style="font-weight:400; text-transform:none; letter-spacing:0; color:var(--muted);">(optional)</span>
                </label>
                <textarea th:field="*{textContent}" class="form-textarea" placeholder="Write your lesson content here…"></textarea>
            </div>

            <div class="or-divider">or</div>

            <div class="form-group" style="margin-top:0.5rem;">
                <div class="upload-zone">
                    <div class="upload-icon">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <p class="upload-label">Upload PDF</p>
                    <p class="upload-hint">Attach a cheat sheet, slide deck, or reference document. (optional)</p>
                    <input type="file" name="file" accept="application/pdf">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">
                    Save Lesson <i class="fas fa-arrow-right" style="font-size:0.75rem;"></i>
                </button>
            </div>
        </form>
    </div>

</div>

<footer>
    <div class="footer-inner">
        <a href="#" class="footer-logo">Radical<span style="color:var(--accent);">.</span></a>
        <p class="footer-copy">&copy; 2025 Radical Studio. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
