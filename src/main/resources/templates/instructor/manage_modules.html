<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Modules | Radical_ Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d0d0d;
            --paper: #f7f5f0;
            --accent: #e8401c;
            --accent-2: #1c6ee8;
            --muted: #7a7672;
            --card-bg: #ffffff;
            --border: rgba(13,13,13,0.1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* NAV */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(247,245,240,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 68px;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1.25rem; letter-spacing: -0.03em;
            color: var(--ink); text-decoration: none;
            display: flex; align-items: center; gap: 0.35rem;
        }
        .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; margin-bottom: 2px; }

        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8125rem;
            letter-spacing: 0.02em; text-decoration: none; cursor: pointer;
            border: none; outline: none; transition: all 0.2s ease;
        }
        .btn-ghost { padding: 0.5rem 1rem; color: var(--muted); background: transparent; border-radius: 6px; }
        .btn-ghost:hover { background: rgba(13,13,13,0.06); color: var(--ink); }

        /* PAGE */
        .page-wrap { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 6rem; }

        .back-link {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.8125rem; font-weight: 500; color: var(--muted);
            text-decoration: none; margin-bottom: 2.5rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--ink); }

        /* COURSE BANNER */
        .course-banner {
            background: var(--ink); color: #fff;
            border-radius: 14px; padding: 2rem 2.5rem;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 3rem; gap: 1rem;
        }
        .course-banner-eyebrow {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: rgba(255,255,255,0.45);
            margin-bottom: 0.35rem;
        }
        .course-banner-title {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: clamp(1.25rem, 2.5vw, 1.75rem);
            letter-spacing: -0.02em;
        }

        /* GRID LAYOUT */
        .content-grid {
            display: grid; grid-template-columns: 280px 1fr;
            gap: 2.5rem; align-items: start;
        }
        @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }

        /* SIDEBAR */
        .sidebar-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem;
            position: sticky; top: 90px;
        }
        .sidebar-title {
            font-size: 0.9rem; font-weight: 700; letter-spacing: -0.01em;
            color: var(--ink); margin-bottom: 1.25rem;
            padding-bottom: 1rem; border-bottom: 1px solid var(--border);
        }

        .form-label {
            display: block; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--muted); margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%; background: var(--paper);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif;
            font-size: 0.9375rem; font-weight: 400; color: var(--ink);
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 1rem;
        }
        .form-input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(13,13,13,0.06); }

        .btn-submit {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8125rem;
            letter-spacing: 0.02em; text-transform: uppercase;
            padding: 0.75rem 1rem; background: var(--ink); color: #fff;
            border-radius: 8px; border: none; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit:hover { background: #2a2a2a; transform: translateY(-1px); }

        /* MODULE LIST */
        .empty-modules {
            text-align: center; padding: 4rem 2rem;
            border: 1.5px dashed var(--border); border-radius: 14px;
            color: var(--muted); font-size: 0.875rem; font-weight: 400;
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        .module-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 1.25rem;
            transition: box-shadow 0.2s;
        }
        .module-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.07); }

        .module-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            gap: 1rem;
        }
        .module-title {
            font-size: 1rem; font-weight: 700; letter-spacing: -0.01em;
            color: var(--ink); flex: 1; min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .module-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

        .icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 6px;
            font-size: 0.75rem; border: none; cursor: pointer;
            transition: all 0.2s; text-decoration: none;
        }
        .icon-btn-edit { background: rgba(13,13,13,0.06); color: var(--ink); }
        .icon-btn-edit:hover { background: var(--ink); color: #fff; }
        .icon-btn-delete { background: rgba(220,38,38,0.08); color: #dc2626; }
        .icon-btn-delete:hover { background: #dc2626; color: #fff; }

        .btn-add-lesson {
            display: inline-flex; align-items: center; gap: 0.35rem;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.7rem;
            letter-spacing: 0.04em; text-transform: uppercase;
            padding: 0.45rem 0.9rem; background: rgba(232,64,28,0.1); color: var(--accent);
            border-radius: 6px; text-decoration: none; transition: all 0.2s;
        }
        .btn-add-lesson:hover { background: var(--accent); color: #fff; }

        /* LESSON LIST */
        .lessons-wrap { padding: 0.75rem 1.5rem 1.25rem; }
        .lessons-wrap .lesson-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: background 0.15s;
            gap: 1rem;
        }
        .lesson-item:hover { background: rgba(13,13,13,0.03); }
        .lesson-item + .lesson-item { border-top: 1px solid var(--border); }

        .lesson-left { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }

        .lesson-type-icon {
            width: 30px; height: 30px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; flex-shrink: 0;
        }
        .icon-pdf { background: #fff0ed; color: var(--accent); }
        .icon-text { background: #edf4ff; color: var(--accent-2); }

        .lesson-name {
            font-size: 0.875rem; font-weight: 500; color: var(--ink);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-decoration: none; transition: color 0.2s; display: block;
        }
        .lesson-name:hover { color: var(--accent); }
        .lesson-type-label {
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--muted); margin-top: 0.1rem;
        }

        .lesson-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
        .lesson-action-link {
            color: var(--muted); font-size: 0.75rem; text-decoration: none;
            transition: color 0.2s; padding: 0.25rem;
        }
        .lesson-action-link:hover { color: var(--ink); }
        .lesson-delete-btn {
            color: var(--muted); font-size: 0.75rem; background: none;
            border: none; cursor: pointer; transition: color 0.2s; padding: 0.25rem;
        }
        .lesson-delete-btn:hover { color: #dc2626; }

        /* FOOTER */
        footer { border-top: 1px solid var(--border); padding: 2rem; }
        .footer-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            gap: 1rem; flex-wrap: wrap;
        }
        .footer-logo {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
            letter-spacing: -0.02em; color: var(--ink); text-decoration: none;
        }
        .footer-copy { font-size: 0.75rem; color: var(--muted); }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a th:href="@{/}" class="logo"><span class="logo-dot"></span>Radical</a>
        <a th:href="@{/instructor/courses}" class="btn btn-ghost">&larr; Courses</a>
    </div>
</nav>

<div class="page-wrap">

    <a th:href="@{/instructor/courses}" class="back-link">
        <i class="fas fa-arrow-left" style="font-size:0.75rem;"></i> Back to Courses
    </a>

    <div class="course-banner">
        <div>
            <p class="course-banner-eyebrow">Course Structure</p>
            <h1 class="course-banner-title" th:text="${course.title}">Course Title</h1>
        </div>
        <i class="fas fa-layer-group" style="font-size:2rem; color:rgba(255,255,255,0.2);"></i>
    </div>

    <div class="content-grid">

        <!-- SIDEBAR: Add Module -->
        <div>
            <div class="sidebar-card">
                <p class="sidebar-title">Add New Module</p>
                <form th:action="@{/instructor/courses/{id}/module(id=${course.id})}" th:object="${newModule}" method="POST">
                    <label class="form-label">Module Title</label>
                    <input type="text" th:field="*{title}" required class="form-input" placeholder="e.g. Section 1: Foundations">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-plus" style="font-size:0.7rem;"></i> Add Module
                    </button>
                </form>
            </div>
        </div>

        <!-- MODULE LIST -->
        <div>
            <div th:if="${moduleList == null or #lists.isEmpty(moduleList)}" class="empty-modules">
                No modules added yet.
            </div>

            <div th:if="${moduleList != null and not #lists.isEmpty(moduleList)}">
                <div th:each="moduleItem:${moduleList}" class="module-card">

                    <div class="module-header">
                        <h3 class="module-title" th:text="${moduleItem.title}">Module Title</h3>

                        <div class="module-actions">
                            <a th:href="@{'/instructor/courses/' + ${course.id} + '/modules/' + ${moduleItem.id} + '/edit'}"
                               class="icon-btn icon-btn-edit" title="Edit Module">
                                <i class="fas fa-pen"></i>
                            </a>
                            <form th:action="@{'/instructor/courses/' + ${course.id} + '/modules/' + ${moduleItem.id} + '/delete'}"
                                  method="post" style="margin:0;"
                                  onsubmit="return confirm('Are you sure you want to delete this module and all its lessons?');">
                                <button type="submit" class="icon-btn icon-btn-delete" title="Delete Module">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                            <a th:href="@{'/instructor/courses/' + ${course.id} + '/modules/' + ${moduleItem.id} + '/lessons/create'}"
                               class="btn-add-lesson">
                                <i class="fas fa-plus"></i> Add Lesson
                            </a>
                        </div>
                    </div>

                    <div th:if="${moduleItem.lessons != null and not #lists.isEmpty(moduleItem.lessons)}" class="lessons-wrap">
                        <div th:each="lessonItem:${moduleItem.lessons}" class="lesson-item">

                            <div class="lesson-left">
                                <div th:if="${lessonItem.contentType == 'PDF'}" class="lesson-type-icon icon-pdf">
                                    <i class="fas fa-file-pdf"></i>
                                </div>
                                <div th:if="${lessonItem.contentType == 'Text'}" class="lesson-type-icon icon-text">
                                    <i class="fas fa-align-left"></i>
                                </div>
                                <div style="min-width:0;">
                                    <a th:href="@{'/instructor/courses/' + ${course.id} + '/modules/' + ${moduleItem.id} + '/lessons/' + ${lessonItem.id}}"
                                       class="lesson-name" th:text="${lessonItem.title}">Lesson Title</a>
                                    <p class="lesson-type-label" th:text="${lessonItem.contentType}">TYPE</p>
                                </div>
                            </div>

                            <div class="lesson-actions">
                                <a th:href="@{'/instructor/courses/' + ${course.id} + '/modules/' + ${moduleItem.id} + '/lessons/' + ${lessonItem.id} + '/edit'}"
                                   class="lesson-action-link" title="Edit Lesson">
                                    <i class="fas fa-pen"></i>
                                </a>
                                <form th:action="@{'/instructor/courses/' + ${course.id} + '/modules/' + ${moduleItem.id} + '/lessons/' + ${lessonItem.id} + '/delete'}"
                                      method="post" style="margin:0;"
                                      onsubmit="return confirm('Delete this lesson permanently?');">
                                    <button type="submit" class="lesson-delete-btn" title="Delete Lesson">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<footer>
    <div class="footer-inner">
        <a href="#" class="footer-logo">Radical<span style="color:var(--accent);">.</span></a>
        <p class="footer-copy">&copy; 2025 Radical Studio. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
