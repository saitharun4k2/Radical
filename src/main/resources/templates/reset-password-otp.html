<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | Radical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root { --ink:#0d0d0d; --paper:#f7f5f0; --accent:#e8401c; --muted:#7a7672; --border:#e5e2dc; }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;justify-content:center;align-items:center;}
        h1,h2,h3,.syne{font-family:'Syne',sans-serif;}
        body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
    </style>
</head>
<body>
<div style="width:100%;max-width:400px;padding:2rem;">
    <h1 style="font-size:2.25rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:.75rem;">Check your email</h1>
    <p style="font-size:.9375rem;color:var(--muted);margin-bottom:2rem;font-weight:300;">We sent a 6-digit verification code to <strong th:text="${session.resetPasswordEmail}"></strong>.</p>

    <div th:if="${error}" style="background:#fff0ed;color:#c0341a;border:1px solid rgba(232,64,28,.2);border-radius:8px;padding:.875rem 1rem;font-size:.875rem;font-weight:500;margin-bottom:1.25rem;">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/reset-password-otp}" method="POST" style="display:flex;flex-direction:column;gap:1.25rem;">
        <div>
            <label style="display:block;font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem;">6-Digit OTP</label>
            <input type="text" name="otp" required placeholder="000000" maxlength="6"
                   style="width:100%;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-size:1.5rem;letter-spacing:.5em;text-align:center;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;">
        </div>
        <button type="submit" style="width:100%;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.9rem 1.5rem;font-family:'Syne',sans-serif;font-weight:700;font-size:.9375rem;cursor:pointer;">
            Verify Code &rarr;
        </button>
    </form>
</div>
</body>
</html>
