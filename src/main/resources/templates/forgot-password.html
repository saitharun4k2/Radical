<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Radical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root { --ink:#0d0d0d; --paper:#f7f5f0; --accent:#e8401c; --muted:#7a7672; --border:#e5e2dc; }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:grid;grid-template-columns:1fr 1fr;}
        h1,h2,h3,.syne{font-family:'Syne',sans-serif;}
        body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        .fade-up{animation:fadeUp .5s ease both;}
        .d1{animation-delay:.08s;}.d2{animation-delay:.18s;}
        @media(max-width:768px){body{grid-template-columns:1fr;}.panel-left{display:none;}}
    </style>
</head>
<body>

<div class="panel-left" style="background:var(--ink);display:flex;flex-direction:column;justify-content:space-between;padding:3rem;overflow:hidden;position:relative;">
    <a th:href="@{/}" style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:.35rem;">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-bottom:2px;"></span>Radical
    </a>
    <div>
        <p style="font-family:'Syne',sans-serif;font-weight:800;font-size:2.5rem;line-height:1.1;letter-spacing:-.03em;color:#fff;">Regain access<br>to your<br><span style="color:var(--accent);">library.</span></p>
    </div>
    <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(232,64,28,.12);bottom:-80px;right:-80px;pointer-events:none;"></div>
</div>

<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:3rem 2rem;">
    <div style="width:100%;max-width:400px;">
        <a th:href="@{/login}" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.8125rem;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:2.5rem;transition:color .2s;">
            <i class="fas fa-arrow-left" style="font-size:.75rem;"></i> Back to login
        </a>
        <h1 class="fade-up d1" style="font-size:2.25rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:.75rem;">Reset Password</h1>
        <p class="fade-up d1" style="font-size:.9375rem;color:var(--muted);margin-bottom:2rem;font-weight:300;">Enter your email address and we'll send you a 6-digit OTP to reset your password.</p>

        <div th:if="${error}" style="background:#fff0ed;color:#c0341a;border:1px solid rgba(232,64,28,.2);border-radius:8px;padding:.875rem 1rem;font-size:.875rem;font-weight:500;margin-bottom:1.25rem;display:flex;align-items:center;gap:.625rem;">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="POST" class="fade-up d2" style="display:flex;flex-direction:column;gap:1.25rem;">
            <div>
                <label style="display:block;font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem;">Email address</label>
                <input type="email" name="email" required placeholder="you@domain.com"
                       style="width:100%;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-size:.9375rem;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;"
                       onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px rgba(232,64,28,.1)'" onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'">
            </div>
            <button type="submit" style="width:100%;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.9rem 1.5rem;font-family:'Syne',sans-serif;font-weight:700;font-size:.9375rem;cursor:pointer;">
                Send OTP &rarr;
            </button>
        </form>
    </div>
</div>
</body>
</html>
