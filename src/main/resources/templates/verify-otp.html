<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Email | Radical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f7f5f0; color: #0d0d0d; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
</head>
<body>

<div style="background: #fff; padding: 3rem; border-radius: 12px; border: 1px solid #e5e2dc; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.03);">
    <h2 style="font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em;">Check your email</h2>
    <p style="color: #7a7672; font-size: 0.9375rem; margin-bottom: 2rem;">We sent a 6-digit verification code to your email. Enter it below to activate your account.</p>

    <div th:if="${error}" style="background: #fff0ed; color: #c0341a; border-radius: 8px; padding: 0.75rem; font-size: 0.875rem; font-weight: 500; margin-bottom: 1.5rem;">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/verify-otp}" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
        <input type="text" name="otp" required maxlength="6" pattern="\d{6}" placeholder="Enter 6-digit code"
               style="text-align: center; font-size: 1.5rem; letter-spacing: 0.2em; padding: 1rem; border: 1.5px solid #e5e2dc; border-radius: 8px; outline: none; transition: border-color 0.2s;">

        <button type="submit" style="background: #0d0d0d; color: #fff; border: none; border-radius: 8px; padding: 1rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s;">
            Verify & Create Account
        </button>
    </form>
</div>

</body>
</html>
