<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Reviews | Radical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root{--ink:#0d0d0d;--paper:#f7f5f0;--accent:#e8401c;--muted:#7a7672;--border-c:rgba(13,13,13,.1);--border-s:#e5e2dc;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:2.5rem 2rem;}
        h1,h2,h3,.syne{font-family:'Syne',sans-serif;}
        body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
        .inner{max-width:1100px;margin:0 auto;}
        .review-card{background:#fff;border:1px solid var(--border-c);border-radius:14px;padding:1.5rem;transition:box-shadow .2s,transform .2s;}
        .review-card:hover{box-shadow:0 12px 36px rgba(0,0,0,.07);transform:translateY(-2px);}
        .stars{display:flex;gap:.125rem;}
        .star-filled{color:#f59e0b;font-size:.875rem;}
        .star-empty{color:var(--border-s);font-size:.875rem;}
    </style>
</head>
<body>
<div class="inner">

    <a th:href="@{/instructor/courses}" href="#" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.8125rem;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:2rem;transition:color .2s;" onmouseover="this.style.color='var(--ink)'" onmouseout="this.style.color='var(--muted)'">
        <i class="fas fa-arrow-left" style="font-size:.7rem;"></i> Back to courses
    </a>

    <!-- Header -->
    <div style="margin-bottom:2.5rem;">
        <p style="font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;"><span style="width:16px;height:1.5px;background:var(--muted);display:inline-block;"></span>Student feedback</p>
        <h1 style="font-size:clamp(1.5rem,2.5vw,2.25rem);font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:1.5rem;" th:text="${course.title}">Course Title</h1>
        <div style="display:flex;gap:.75rem;flex-wrap:wrap;">
            <div style="background:#fff;border:1px solid var(--border-c);border-radius:10px;padding:.75rem 1.25rem;display:flex;align-items:center;gap:.625rem;">
                <i class="fas fa-star" style="color:#f59e0b;font-size:1rem;"></i>
                <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;" th:text="${course.averageRating}">0.0</span>
                <span style="font-size:.75rem;color:var(--muted);">avg. rating</span>
            </div>
            <div style="background:#fff;border:1px solid var(--border-c);border-radius:10px;padding:.75rem 1.25rem;display:flex;align-items:center;gap:.625rem;">
                <i class="fas fa-comment" style="color:var(--accent);font-size:1rem;"></i>
                <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;" th:text="${reviews.size()}">0</span>
                <span style="font-size:.75rem;color:var(--muted);">total reviews</span>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(reviews)}" style="text-align:center;padding:5rem 2rem;border:1.5px dashed var(--border-s);border-radius:16px;">
        <div style="width:52px;height:52px;border-radius:50%;background:rgba(13,13,13,.04);display:flex;align-items:center;justify-content:center;font-size:1.25rem;color:var(--muted);margin:0 auto .875rem;">
            <i class="fas fa-star"></i>
        </div>
        <h3 style="font-size:1.125rem;font-weight:700;margin-bottom:.4rem;">No reviews yet</h3>
        <p style="font-size:.875rem;color:var(--muted);font-weight:300;">Reviews will appear here once students complete and rate the course.</p>
    </div>

    <!-- Review grid -->
    <div th:if="${not #lists.isEmpty(reviews)}" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;">
        <div th:each="review:${reviews}" class="review-card">
            <!-- Reviewer -->
            <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border-s);">
                <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#f59e0b);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <i class="fas fa-user" style="font-size:.7rem;color:#fff;"></i>
                </div>
                <div>
                    <p style="font-family:'Syne',sans-serif;font-weight:700;font-size:.875rem;" th:text="${review.student.name}">Student</p>
                    <p style="font-size:.7rem;color:var(--muted);" th:text="'Student #' + ${review.student.id}">ID</p>
                </div>
            </div>
            <!-- Stars -->
            <div style="display:flex;gap:.125rem;margin-bottom:.875rem;">
                <i th:each="i : ${#numbers.sequence(1,5)}"
                   class="fas fa-star"
                   th:style="${i <= review.rating} ? 'color:#f59e0b;font-size:.875rem;' : 'color:var(--border-s);font-size:.875rem;'"></i>
                <span style="font-size:.75rem;color:var(--muted);margin-left:.4rem;font-weight:500;" th:text="${review.rating} + ' / 5'"></span>
            </div>
            <!-- Comment -->
            <p th:if="${not #strings.isEmpty(review.comment)}" style="font-size:.875rem;color:var(--ink);line-height:1.7;font-weight:300;font-style:italic;" th:text="${review.comment}">Comment</p>
            <p th:if="${#strings.isEmpty(review.comment)}" style="font-size:.8125rem;color:var(--muted);font-weight:300;font-style:italic;">No written feedback provided.</p>
        </div>
    </div>

</div>
</body>
</html>
