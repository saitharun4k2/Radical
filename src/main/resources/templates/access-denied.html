<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | Radical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root{--ink:#0d0d0d;--paper:#f7f5f0;--accent:#e8401c;--muted:#7a7672;--border:#e5e2dc;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
        h1,h2,.syne{font-family:'Syne',sans-serif;}
        body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        .fade-up{animation:fadeUp .55s ease both;}.d1{animation-delay:.1s;}.d2{animation-delay:.2s;}.d3{animation-delay:.3s;}
    </style>
</head>
<body>

<div style="width:100%;max-width:460px;text-align:center;">

    <!-- 403 badge -->
    <div class="fade-up" style="display:inline-flex;align-items:center;gap:.5rem;background:#fff0ed;border:1px solid rgba(232,64,28,.2);border-radius:100px;padding:.4rem .875rem;margin-bottom:2rem;">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span>
        <span style="font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);">Error 403</span>
    </div>

    <!-- Icon -->
    <div class="fade-up d1" style="width:80px;height:80px;border-radius:50%;background:rgba(232,64,28,.08);display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;">
        <i class="fas fa-ban" style="font-size:2rem;color:var(--accent);"></i>
    </div>

    <h1 class="fade-up d2" style="font-size:2.5rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:1rem;">Access Denied</h1>
    <p class="fade-up d2" style="font-size:1rem;color:var(--muted);line-height:1.7;font-weight:300;margin-bottom:2.5rem;max-width:360px;margin-left:auto;margin-right:auto;">
        You don't have permission to view this page. If you believe this is an error, please contact support or return home.
    </p>

    <div class="fade-up d3" style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;">
        <a th:href="@{/}" href="#"
           style="display:inline-flex;align-items:center;gap:.4rem;background:var(--ink);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.8125rem;letter-spacing:.02em;text-decoration:none;padding:.6rem 1.25rem;border-radius:8px;transition:background .2s,transform .15s;"
           onmouseover="this.style.background='#2a2a2a';this.style.transform='translateY(-1px)'"
           onmouseout="this.style.background='var(--ink)';this.style.transform='none'">
            <i class="fas fa-arrow-left" style="font-size:.75rem;"></i> Go home
        </a>
        <a href="mailto:hello@radical.com"
           style="display:inline-flex;align-items:center;gap:.4rem;background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:.8125rem;letter-spacing:.02em;text-decoration:none;padding:.6rem 1.25rem;border-radius:8px;border:1.5px solid var(--border);transition:all .2s;"
           onmouseover="this.style.borderColor='var(--ink)';this.style.color='var(--ink)'"
           onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
            Contact support
        </a>
    </div>

</div>

</body>
</html>
