<!-- course-students.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Roster | Radical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root{--ink:#0d0d0d;--paper:#f7f5f0;--accent:#e8401c;--teal:#0d9488;--muted:#7a7672;--border-c:rgba(13,13,13,.1);--border-s:#e5e2dc;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:2.5rem 2rem;}
        h1,h2,h3,.syne{font-family:'Syne',sans-serif;}
        body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
        .inner{max-width:1100px;margin:0 auto;}
        .student-card{background:#fff;border:1px solid var(--border-c);border-radius:14px;overflow:hidden;transition:box-shadow .2s,transform .2s;}
        .student-card:hover{box-shadow:0 12px 36px rgba(0,0,0,.07);transform:translateY(-2px);}
        .progress-track{width:100%;height:5px;background:rgba(13,13,13,.07);border-radius:100px;overflow:hidden;}
        .progress-fill{height:100%;background:var(--teal);border-radius:100px;}
    </style>
</head>
<body>
<div class="inner">

    <a th:href="@{/instructor/courses}" href="#" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.8125rem;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:2rem;transition:color .2s;" onmouseover="this.style.color='var(--ink)'" onmouseout="this.style.color='var(--muted)'">
        <i class="fas fa-arrow-left" style="font-size:.7rem;"></i> Back to courses
    </a>

    <div style="margin-bottom:2.5rem;">
        <p style="font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;"><span style="width:16px;height:1.5px;background:var(--muted);display:inline-block;"></span>Course roster</p>
        <h1 style="font-size:clamp(1.5rem,2.5vw,2.25rem);font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:.875rem;" th:text="${course.title}">Course Title</h1>
        <span style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:#e6faf8;color:var(--teal);padding:.3rem .75rem;border-radius:4px;" th:text="${enrolledStudents.size()} + ' students enrolled'">0 students enrolled</span>
    </div>

    <div th:if="${#lists.isEmpty(enrolledStudents)}" style="text-align:center;padding:5rem 2rem;border:1.5px dashed var(--border-s);border-radius:16px;">
        <div style="width:52px;height:52px;border-radius:50%;background:rgba(13,13,13,.04);display:flex;align-items:center;justify-content:center;font-size:1.25rem;color:var(--muted);margin:0 auto .875rem;"><i class="fas fa-users"></i></div>
        <h3 style="font-size:1.125rem;font-weight:700;margin-bottom:.4rem;">No students yet</h3>
        <p style="font-size:.875rem;color:var(--muted);font-weight:300;">Students will appear here once they enroll.</p>
    </div>

    <div th:if="${not #lists.isEmpty(enrolledStudents)}" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;">
        <div th:each="student:${enrolledStudents}" class="student-card">
            <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border-s);display:flex;align-items:center;gap:.875rem;">
                <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#1c6ee8);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <i class="fas fa-user" style="font-size:.75rem;color:#fff;"></i>
                </div>
                <div>
                    <p style="font-family:'Syne',sans-serif;font-weight:700;font-size:.9375rem;letter-spacing:-.01em;" th:text="${student.name}">Student</p>
                    <p style="font-size:.7rem;color:var(--muted);" th:text="'ID #' + ${student.id}">ID</p>
                </div>
            </div>
            <div style="padding:1.25rem 1.5rem;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;">
                    <span style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);">Progress</span>
                    <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:.875rem;color:var(--teal);" th:text="${studentProgress.get(student.id)} + '%'">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" th:style="'width:' + ${studentProgress.get(student.id)} + '%'"></div>
                </div>
                <div style="margin-top:.875rem;">
                    <span th:if="${studentProgress.get(student.id) == 100}" style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;background:#fef9c3;color:#854d0e;padding:.25rem .6rem;border-radius:4px;">
                        <i class="fas fa-award"></i> Completed
                    </span>
                    <span th:if="${studentProgress.get(student.id) > 0 and studentProgress.get(student.id) < 100}" style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;background:#e6faf8;color:var(--teal);padding:.25rem .6rem;border-radius:4px;">
                        In progress
                    </span>
                    <span th:if="${studentProgress.get(student.id) == 0}" style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;background:rgba(13,13,13,.05);color:var(--muted);padding:.25rem .6rem;border-radius:4px;">
                        Not started
                    </span>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
